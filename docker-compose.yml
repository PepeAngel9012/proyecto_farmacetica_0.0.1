services:
  nexus_web:
    build: .
    container_name: nexus_web
    ports:
      - "8000:8000"
    environment:
      
      - DATABASE_URL=postgresql://nexus_admin:nexus_password123@nexus_db:5432/nexus_db
    depends_on:
      - nexus_db
    restart: always

  nexus_db:
    image: postgres:15-alpine
    container_name: nexus_db
    environment:
      - POSTGRES_USER=nexus_admin
      - POSTGRES_PASSWORD=nexus_password123
      - POSTGRES_DB=nexus_db
    ports:
      - "5432:5432"
    volumes:
      - nexus_pgdata:/var/lib/postgresql/data

volumes:
  nexus_pgdata: